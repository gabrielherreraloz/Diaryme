<!DOCTYPE html>
<html lang = "es">
    <head>
        <meta charset = "utf-8" />
        <title>
            Diaryme - Contacta
        </title>
        <link rel="stylesheet" href="css/diseño.css" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>

    <body>
        <header>
            <h1>
                Diaryme
            </h1>
        </header>
        <main>
            <h2>
                Contactar:
            </h2>
            <form>
                <label for="nombre">
                    Nombre completo:
                </label>
                <div><input type="text" id="nombre" name="nombre" required></div>
                <br>
                <label for="nombre">
                    Correo electrónico:
                </label>
                <div><input type="text" id="email" name="email" placeholder="Correo electrónico" pattern="[a-z0-9.\-]+@[a-z0-9.\-]+" required></div>
                <br>
                <label for="nombre">
                    Comentarios:
                </label>
                <textarea name="comentario" placeholder="Comentarios" rows="5"></textarea>
                <br>
                <input type="checkbox" id="alta" name="alta1">
                <label for="alta">
                    Darse de alta en nuestra newsletter para recibir noticias y actualizaciones
                </label>
                <br>
                <br>
                <input type="submit">
                <input type="reset">
            </form>

        </main>
        <footer>
            <div>All Rights Reserved</div>
        </footer>
    </body>
</html>
