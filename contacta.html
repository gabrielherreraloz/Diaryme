<!DOCTYPE html>
<html lang = "es">
    <head>
        <meta charset = "utf-8" />
        <title>
            Diaryme - Contacta
        </title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>

    <body>
        <div class="container text-center">
            <header class="container mt-4">
                <h1 class="text-center">
                    Diaryme
                </h1>
            </header>
            <main>
                <nav class="navbar navbar-expand-lg bg-body-tertiary" data-bs-theme="dark">
                    <div class="container-fluid">
                        <a class="navbar-brand"> 
                            Menú
                        </a>
                        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav-menu" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                            <span class="navbar-toggler-icon"></span>
                        </button>
                        <div class="collapse navbar-collapse" id="nav-menu">
                            <ul class="navbar-nav" text-start ms-0>
                                <li class="nav-item">
                                    <a class="nav-link active" aria-current="page" href="index.html"> 
                                        Principal
                                    </a>
                                </li>
                                <li class="nav-item">
                                    <a class="nav-link active" aria-current="page" href="sobremi.html"> 
                                        Sobre mí
                                    </a>
                                </li>
                                <li class="nav-item">
                                    <a class="nav-link active" aria-current="page" href="contacta.html"> 
                                        Contacta
                                    </a>
                                </li>
                            </ul>
                        </div>
                    </div>
                    
                </nav>
                <br>
                <h2 class="mb-5">
                    Contactar:
                </h2>
                <form class="row align-items-end">
                    <div class="col-12 col-md-6 mb-4">
                        <div class="form-floating">
                            <input type="text" class="form-control" id="input-nombre" placeholder=" " required>
                            <label for="input-nombre">
                                Nombre
                            </label>
                        </div>
                    </div>
                    <br>
                    <div class="col-12 col-md-6 mb-4">
                        <div class="form-floating">
                            <input type="text" class="form-control" id="input-apellidos" placeholder=" " required>
                            <label for="input-apellidos">
                                Apellidos
                            </label>
                        </div>
                    </div>
                    <br>
                    <div class="col-12 col-md-6 mb-4">
                        <div class="form-floating">
                            <input type="text" class="form-control" id="input-email" placeholder=" " pattern="[a-z0-9.\-]+@[a-z0-9.\-]+" required>
                            <label for="input-email">
                                Correo Electrónico
                            </label>
                        </div>
                    </div>
                    <br>
                    <div class="col-12 col-md-6 mb-4">
                        <div class="form-floating">
                            <select id="select-pokemon" class="form-select required" placeholder=" ">
                                <option value="1">
                                    Bulbasur
                                </option>
                                <option value="2">
                                    Charmander
                                </option>
                                <option value="3">
                                    Squirtle
                                </option>
                            </select>
                            <label for="select-pokemon">
                                Pokemon favorito
                            </label>
                        </div>
                    </div>
                    <br>
                    <div class="col-12">
                        <div class="form-floating mb-4">
                            <textarea id="input-comentario" class="form-control" placeholder=" "></textarea>
                            <label for="input-comentario">
                                Comentarios
                            </label>
                        </div>
                    </div>
                    <br>
                    <div class="d-flex-mb justify-content-center">
                        <input type="checkbox" id="alta" name="alta1">
                        <label for="alta" class="mb-4">
                            Darse de alta en nuestra newsletter para recibir noticias y actualizaciones
                        </label>
                    </div>
                    <br>
                    <div class="d-flex-mb justify-content-center">
                        <input type="submit" class="btn btn-primary col-12 col-md-3 me-2 mb-2">
                        <input type="reset" class="btn btn-dark col-12 col-md-3 mb-2">
                    </div>
                    
                </form>

            </main>
            <footer>
                <div>All Rights Reserved</div>
            </footer>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </body>
</html>
